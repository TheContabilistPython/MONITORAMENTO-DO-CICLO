<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta name="description" content="Panorama dos indicadores coincidentes do ciclo econômico brasileiro.">
<title>Observatório do Ciclo — Panorama dos Indicadores</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@400;500;600&family=Source+Serif+4:opsz,wght@8..60,500;8..60,600&display=swap" rel="stylesheet">
<script src="https://cdn.plot.ly/plotly-2.35.2.min.js"></script>
<style>
:root{
  --papel:#f3f0e8; --papel-2:#ebe6da; --cartao:#fbfaf6; --tinta:#17211c;
  --tinta-2:#53605a; --linha:#d5d0c4; --verde:#2f6b55; --verde-claro:#dce8df;
  --ocre:#a47b2c; --ocre-claro:#eee4cb; --vermelho:#a94f43; --vermelho-claro:#eedbd7;
  --cinza:#79817c; --serif:'Source Serif 4',Georgia,serif;
  --sans:'IBM Plex Sans','Segoe UI',sans-serif;
}
*{box-sizing:border-box}
html{scroll-behavior:smooth}
body{margin:0;background:var(--papel);color:var(--tinta);font-family:var(--sans);font-size:15px}
button{font:inherit;color:inherit}
.casca{max-width:1480px;margin:0 auto;padding:0 34px 34px}
.masthead{border-top:7px solid var(--tinta);border-bottom:1px solid var(--linha);padding:26px 0 18px}
.masthead-topo{display:grid;grid-template-columns:1fr auto;gap:28px;align-items:end}
.marca-kicker,.secao-kicker{font-size:11px;font-weight:600;letter-spacing:.16em;text-transform:uppercase;color:var(--verde)}
.marca{font-family:var(--serif);font-size:46px;font-weight:600;line-height:.95;letter-spacing:-.035em;margin:5px 0 4px}
.marca-link{display:inline-block;color:inherit;text-decoration:none;cursor:pointer}
.marca-link:hover{text-decoration:underline;text-decoration-thickness:1px;text-underline-offset:7px}
.marca-link:focus-visible{outline:2px solid var(--verde);outline-offset:5px}
.marca-sub{color:var(--tinta-2);font-size:13px}
.edicao{text-align:right;border-left:1px solid var(--linha);padding-left:24px;min-width:280px}
.edicao strong{display:block;font-family:var(--serif);font-size:21px;font-weight:600;margin:3px 0}
.edicao span{font-size:12px;color:var(--tinta-2)}
.navegacao{display:flex;gap:26px;margin-top:22px;align-items:center}
.nav-item{border:0;background:transparent;padding:0 0 7px;font-size:12px;font-weight:600;letter-spacing:.08em;text-transform:uppercase}
.nav-item.ativo{border-bottom:2px solid var(--verde)}
.nav-item.inativo{color:#9a9d98;cursor:not-allowed}
.aviso-frescor{margin:18px 0 0;border:1px solid var(--linha);background:rgba(251,250,246,.72);padding:11px 14px;
  display:flex;gap:12px;align-items:flex-start;font-size:12px;color:var(--tinta-2)}
.aviso-frescor strong{color:var(--tinta)}
.sinal-frescor{width:8px;height:8px;border-radius:50%;background:var(--verde);margin-top:4px;flex:0 0 auto}
.sinal-frescor.cache{background:var(--ocre)}
main{padding-top:28px}
.hero{display:grid;grid-template-columns:minmax(340px,.82fr) minmax(520px,1.45fr);border-top:1px solid var(--tinta);border-bottom:1px solid var(--linha)}
.hero-leitura{padding:28px 34px 30px 0;border-right:1px solid var(--linha)}
.hero-grafico{padding:24px 0 20px 34px;min-width:0}
.hero h1{font-family:var(--serif);font-size:42px;line-height:1.03;letter-spacing:-.03em;font-weight:600;margin:11px 0 15px}
.hero-texto{font-family:var(--serif);font-size:18px;line-height:1.55;color:#38443e;max-width:550px}
.numero-chave{display:flex;align-items:baseline;gap:11px;margin:24px 0 8px}
.numero-chave strong{font-family:var(--serif);font-size:62px;font-weight:600;line-height:1;color:var(--verde)}
.numero-chave span{color:var(--tinta-2);font-size:13px;max-width:150px}
.tag-estagio{display:inline-flex;align-items:center;gap:8px;border:1px solid currentColor;padding:6px 9px;font-size:11px;font-weight:600;letter-spacing:.08em;text-transform:uppercase}
.tag-estagio::before{content:'';width:7px;height:7px;background:currentColor;border-radius:50%}
.grafico-cab{display:flex;justify-content:space-between;gap:20px;align-items:flex-start;margin-bottom:8px}
.grafico-cab h2,.secao-cab h2{font-family:var(--serif);font-size:28px;font-weight:600;letter-spacing:-.02em;margin:4px 0}
.grafico-cab p,.secao-cab p{margin:0;color:var(--tinta-2);font-size:12px;line-height:1.45}
.historico-svg{width:100%;height:220px;display:block;overflow:visible}
.seletor-meses{display:grid;grid-template-columns:repeat(12,1fr);border-top:1px solid var(--linha)}
.mes-botao{border:0;border-right:1px solid var(--linha);background:transparent;padding:9px 3px;font-size:10px;color:var(--tinta-2);cursor:pointer}
.mes-botao:last-child{border-right:0}
.mes-botao:hover,.mes-botao.ativo{background:var(--tinta);color:var(--papel)}
.comparativos{display:grid;grid-template-columns:repeat(3,1fr);border-bottom:1px solid var(--linha);margin-bottom:38px}
.comparativo{padding:19px 22px;border-right:1px solid var(--linha);background:rgba(251,250,246,.42)}
.comparativo:first-child{padding-left:0;background:transparent}
.comparativo:last-child{border-right:0}
.comparativo .tempo{font-size:10px;letter-spacing:.12em;text-transform:uppercase;color:var(--tinta-2)}
.comparativo .valor{font-family:var(--serif);font-size:27px;margin:4px 0}
.comparativo .detalhe{font-size:11px;color:var(--tinta-2)}
.secao{margin-top:38px}
.secao-cab{display:flex;justify-content:space-between;gap:28px;align-items:end;border-bottom:1px solid var(--tinta);padding-bottom:12px;margin-bottom:0}
.secao-cab p{max-width:520px;text-align:right}
.grade-setores{display:grid;grid-template-columns:repeat(3,1fr)}
.setor-card{appearance:none;position:relative;overflow:hidden;border:0;border-right:1px solid var(--linha);border-bottom:1px solid var(--linha);
  background:linear-gradient(145deg,var(--cenario-fundo,transparent),rgba(251,250,246,.18) 72%);text-align:left;
  padding:24px 25px 22px 18px;margin-right:25px;min-height:200px;cursor:pointer;transition:background .18s,transform .18s}
.setor-card::before{content:'';position:absolute;left:0;top:22px;bottom:22px;width:3px;background:var(--cenario,var(--cinza));opacity:.62}
.setor-card:nth-child(3n){border-right:0;margin-right:0}
.setor-card:hover{background:linear-gradient(145deg,var(--cenario-hover,rgba(251,250,246,.72)),rgba(251,250,246,.34) 72%);transform:translateY(-1px)}
.setor-card:focus-visible{outline:2px solid var(--cenario,var(--verde));outline-offset:-2px}
.setor-topo{display:flex;justify-content:space-between;gap:18px;align-items:flex-start}
.setor-num{font-size:10px;letter-spacing:.14em;color:var(--tinta-2)}
.setor-card h3{font-family:var(--serif);font-size:27px;font-weight:600;margin:20px 0 6px}
.setor-card p{margin:0;color:var(--tinta-2);font-size:12px;line-height:1.5}
.saldo-setor{font-family:var(--serif);font-size:36px;line-height:1;color:var(--verde)}
.saldo-setor small{font-family:var(--sans);font-size:11px;color:var(--tinta-2)}
.setor-rodape{display:flex;justify-content:space-between;gap:16px;align-items:end;margin-top:22px}
.mini-spark{width:135px;height:34px}
.matriz-wrap{overflow:auto;border-bottom:1px solid var(--linha)}
.matriz{width:100%;border-collapse:collapse;min-width:900px;background:rgba(251,250,246,.25)}
.matriz th{font-size:10px;text-transform:uppercase;letter-spacing:.08em;color:var(--tinta-2);font-weight:500;padding:12px 8px;border-bottom:1px solid var(--linha)}
.matriz th:first-child{text-align:left;padding-left:0;min-width:310px}
.matriz td{padding:12px 8px;border-bottom:1px solid var(--linha);text-align:center}
.matriz td:first-child{text-align:left;padding-left:0}
.linha-indicador{appearance:none;border:0;background:transparent;text-align:left;padding:0;cursor:pointer}
.linha-indicador strong{display:block;font-family:var(--serif);font-size:17px;font-weight:600}
.linha-indicador span{font-size:10px;color:var(--tinta-2)}
.celula-sinal{display:inline-flex;width:31px;height:31px;align-items:center;justify-content:center;border:1px solid transparent;font-size:15px}
.celula-sinal.stale{opacity:.42;border-style:dashed}
.valor-tabela{font-weight:600;font-size:13px;white-space:nowrap}
.competencia{font-size:10px;color:var(--tinta-2);white-space:nowrap}
.breadcrumb{display:flex;flex-wrap:wrap;gap:8px;align-items:center;font-size:11px;color:var(--tinta-2);margin-bottom:22px}
.breadcrumb button{border:0;background:transparent;padding:0;cursor:pointer;text-decoration:underline;text-underline-offset:3px}
.breadcrumb .voltar-inicio{display:inline-flex;align-items:center;gap:8px;border:1px solid var(--linha);background:rgba(251,250,246,.58);
  padding:5px 10px 5px 5px;text-decoration:none;font-weight:600;transition:border-color .18s,background .18s}
.seta-voltar{display:inline-flex;width:25px;height:25px;align-items:center;justify-content:center;background:var(--tinta);color:var(--papel);
  font-size:16px;line-height:1;transition:transform .18s}
.breadcrumb .voltar-inicio:hover{border-color:var(--tinta);background:var(--cartao)}
.breadcrumb .voltar-inicio:hover .seta-voltar{transform:translateX(-2px)}
.breadcrumb .voltar-inicio:focus-visible{outline:2px solid var(--verde);outline-offset:2px}
.pagina-cab{display:grid;grid-template-columns:1fr auto;gap:30px;align-items:end;border-top:1px solid var(--tinta);border-bottom:1px solid var(--linha);padding:25px 0}
.pagina-cab h1{font-family:var(--serif);font-size:43px;font-weight:600;letter-spacing:-.03em;margin:4px 0}
.pagina-cab p{margin:0;color:var(--tinta-2);max-width:690px;line-height:1.55}
.pagina-resumo{text-align:right}
.pagina-resumo strong{font-family:var(--serif);font-size:38px;font-weight:600;display:block}
.competencias{display:flex;gap:7px;flex-wrap:wrap;margin:18px 0 26px}
.competencia-link{border:1px solid var(--linha);background:var(--cartao);padding:7px 10px;font-size:11px;cursor:pointer}
.competencia-link.ativo{background:var(--tinta);color:var(--papel);border-color:var(--tinta)}
.grade-indicadores{display:grid;grid-template-columns:repeat(2,1fr);border-top:1px solid var(--linha)}
.indicador-card{appearance:none;border:0;border-right:1px solid var(--linha);border-bottom:1px solid var(--linha);background:transparent;text-align:left;
  padding:24px 26px 22px 0;margin-right:26px;cursor:pointer;min-height:220px}
.indicador-card:nth-child(2n){border-right:0;margin-right:0}
.indicador-card:hover h3{text-decoration:underline;text-underline-offset:4px}
.indicador-card h3{font-family:var(--serif);font-size:24px;font-weight:600;margin:8px 0 5px}
.indicador-meta{display:flex;justify-content:space-between;gap:15px;font-size:11px;color:var(--tinta-2)}
.indicador-valor{font-family:var(--serif);font-size:38px;margin:20px 0 2px}
.faixa-historico{display:flex;gap:5px;margin-top:19px;align-items:center}
.ponto-mes{height:8px;flex:1;min-width:12px;background:var(--linha);position:relative}
.ponto-mes::after{content:attr(data-mes);position:absolute;top:12px;left:0;font-size:8px;color:var(--tinta-2);opacity:0}
.ponto-mes:hover::after{opacity:1}
.detalhe-topo{display:grid;grid-template-columns:1.4fr .6fr;gap:34px;border-top:1px solid var(--tinta);border-bottom:1px solid var(--linha);padding:28px 0}
.detalhe-topo h1{font-family:var(--serif);font-size:44px;font-weight:600;letter-spacing:-.03em;margin:5px 0 8px}
.detalhe-topo p{color:var(--tinta-2);margin:0;line-height:1.55}
.detalhe-fonte{font-size:11px;color:var(--tinta-2);line-height:1.6;align-self:end}
.detalhe-fonte strong{color:var(--tinta)}
.metricas{display:grid;grid-template-columns:repeat(3,1fr);border-bottom:1px solid var(--linha)}
.metrica{padding:22px 26px;border-right:1px solid var(--linha)}
.metrica:first-child{padding-left:0}.metrica:last-child{border-right:0}
.metrica .rotulo{font-size:10px;text-transform:uppercase;letter-spacing:.1em;color:var(--tinta-2)}
.metrica .valor{font-family:var(--serif);font-size:37px;margin:4px 0}
.metrica p{font-size:11px;line-height:1.45;color:var(--tinta-2);margin:0}
.graficos{display:grid;grid-template-columns:1.55fr .75fr;gap:28px;margin-top:32px}
.grafico-painel{background:var(--cartao);border:1px solid var(--linha);padding:12px}
.grafico-titulo{font-family:var(--serif);font-size:20px;padding:8px 10px 0}
.fichas{display:grid;grid-template-columns:repeat(3,1fr);border-top:1px solid var(--tinta);margin-top:36px}
.ficha{padding:23px 28px 12px 0;margin-right:28px;border-right:1px solid var(--linha)}
.ficha:last-child{border-right:0;margin-right:0}
.ficha h3{font-family:var(--serif);font-size:21px;font-weight:600;margin:4px 0 10px}
.ficha p{font-size:13px;color:var(--tinta-2);line-height:1.65;margin:0}
.rodape{margin-top:48px;padding:20px 0;border-top:1px solid var(--tinta);font-size:11px;color:var(--tinta-2);display:flex;justify-content:space-between;gap:24px}
.rodape strong{color:var(--tinta)}
.revelar{animation:entrada .45s ease both}
@keyframes entrada{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:none}}
@media(max-width:1050px){
  .hero,.detalhe-topo,.graficos{grid-template-columns:1fr}.hero-leitura{border-right:0;border-bottom:1px solid var(--linha)}
  .hero-grafico{padding-left:0}.grade-setores{grid-template-columns:repeat(2,1fr)}
  .setor-card:nth-child(3n){border-right:1px solid var(--linha);margin-right:25px}.setor-card:nth-child(2n){border-right:0;margin-right:0}
}
@media(max-width:720px){
  .casca{padding:0 18px 24px}.masthead-topo,.pagina-cab{grid-template-columns:1fr}.edicao{text-align:left;border-left:0;border-top:1px solid var(--linha);padding:14px 0 0}
  .marca{font-size:37px}.navegacao{gap:14px;overflow:auto}.hero h1,.pagina-cab h1,.detalhe-topo h1{font-size:35px}
  .grade-setores,.grade-indicadores,.metricas,.fichas,.comparativos{grid-template-columns:1fr}
  .setor-card,.setor-card:nth-child(3n),.indicador-card{border-right:0;margin-right:0}.comparativo,.metrica,.ficha{border-right:0;border-bottom:1px solid var(--linha);padding-left:0}
  .seletor-meses{grid-template-columns:repeat(6,1fr)}.secao-cab{display:block}.secao-cab p{text-align:left;margin-top:7px}
  .pagina-resumo{text-align:left}.numero-chave strong{font-size:52px}.rodape{display:block}
}
</style>
</head>
<body>
<div class="casca">
  <header class="masthead">
    <div class="masthead-topo">
      <div>
        <div class="marca-kicker">Monitoramento econômico</div>
        <a class="marca marca-link" href="#home" aria-label="Voltar ao panorama inicial">Observatório do Ciclo</a>
        <div class="marca-sub">Indicadores coincidentes da atividade brasileira</div>
      </div>
      <div class="edicao">
        <div class="marca-kicker">Edição em formação</div>
        <strong id="mes-corrente"></strong>
        <span>Dados oficiais disponíveis até <span id="competencia-recente"></span></span>
      </div>
    </div>
    <nav class="navegacao" aria-label="Estruturas do ciclo">
      <button class="nav-item inativo" title="Em construção" disabled>Antecedentes</button>
      <button class="nav-item ativo" onclick="nav('home')">Coincidentes</button>
      <button class="nav-item inativo" title="Em construção" disabled>Defasados</button>
    </nav>
    <div class="aviso-frescor" id="aviso-frescor"></div>
  </header>
  <main id="conteudo" class="revelar" tabindex="-1"></main>
  <footer class="rodape" id="rodape"></footer>
</div>

<script>
const P = __PAYLOAD__;
const TEXTOS = __TEXTOS__;
const SETORES = __SETORES__;
const CORES = {positivo:'#2f6b55', estavel:'#a47b2c', negativo:'#a94f43', neutro:'#79817c'};
const PAPEL='#f3f0e8', CARTAO='#fbfaf6', TINTA='#17211c', TINTA2='#53605a', LINHA='#d5d0c4';
const FONTE="'IBM Plex Sans','Segoe UI',sans-serif";
let referenciaSelecionada = (P.panorama_historico.at(-1) || {}).referencia || P.referencia_alvo;

function esc(t){ const d=document.createElement('div'); d.textContent=t??''; return d.innerHTML; }
function fmtNum(v, dec=1){
  if(v===null||v===undefined||Number.isNaN(v)) return '—';
  return Number(v).toLocaleString('pt-BR',{minimumFractionDigits:dec,maximumFractionDigits:dec});
}
function fmtVar(v, unidade='%'){
  if(v===null||v===undefined||Number.isNaN(v)) return '—';
  const sinal=v>=0?'+':'−', a=Math.abs(v);
  if(unidade==='%') return sinal+fmtNum(a,1)+'%';
  if(unidade==='p.p.') return sinal+fmtNum(a,1)+' p.p.';
  return sinal+a.toLocaleString('pt-BR',{maximumFractionDigits:0});
}
function mesPt(ref, longo=false){
  if(!ref||!ref.includes('-')) return ref||'—';
  const [ano,mes]=ref.split('-').map(Number);
  const data=new Date(ano,mes-1,1);
  const texto=data.toLocaleDateString('pt-BR',{month:longo?'long':'short',year:'numeric'}).replace(' de ',' ');
  return longo?texto.charAt(0).toUpperCase()+texto.slice(1):texto.replace('.','');
}
function corSinal(sinal){ return sinal>0?CORES.positivo:sinal<0?CORES.negativo:CORES.estavel; }
function setaSinal(sinal){ return sinal>0?'↑':sinal<0?'↓':'→'; }
function textoSinal(sinal){ return sinal>0?'em alta':sinal<0?'em queda':'estável'; }
function direcao(h){ return h?.direcao_tendencia??h?.sinal??0; }
function grupoDe(setor){ return P.indicadores.filter(i=>setor.dims.includes(i.dimensao)); }
function setorPorSlug(slug){ return SETORES.find(s=>s.slug===slug); }
function leituraEm(ind,ref=referenciaSelecionada){
  const hist=(ind.historico||[]).filter(h=>h.referencia<=ref);
  return hist.length?hist[hist.length-1]:null;
}
function panoramaEm(ref=referenciaSelecionada){ return P.panorama_historico.find(p=>p.referencia===ref)||P.panorama_historico.at(-1); }
function resumoGrupo(grupo,ref=referenciaSelecionada){
  const leituras=grupo.map(i=>({ind:i,h:leituraEm(i,ref)})).filter(x=>x.h);
  const altas=leituras.filter(x=>direcao(x.h)>0).length, quedas=leituras.filter(x=>direcao(x.h)<0).length;
  return {leituras,altas,quedas,total:leituras.length,share:leituras.length?altas/leituras.length:0};
}
function nav(rota){ location.hash=rota; }
function selecionarMes(ref){ referenciaSelecionada=ref; render(); }

function serieAte(ind,ref=referenciaSelecionada){
  const s=ind.serie||{datas:[],valores:[],mm3:[]};
  const limite=s.datas.reduce((n,d,i)=>d<=ref?i+1:n,0);
  return {datas:s.datas.slice(0,limite),valores:s.valores.slice(0,limite),mm3:s.mm3.slice(0,limite)};
}

function svgSpark(ind,cor=CORES.positivo,w=150,h=38){
  const vals=serieAte(ind).valores.filter(v=>v!==null&&v!==undefined).slice(-24);
  if(vals.length<2) return '';
  const min=Math.min(...vals),max=Math.max(...vals),amp=max-min||1,pad=2;
  const pts=vals.map((v,i)=>`${(pad+i*(w-pad*2)/(vals.length-1)).toFixed(1)},${(h-pad-(v-min)/amp*(h-pad*2)).toFixed(1)}`).join(' ');
  return `<svg class="mini-spark" viewBox="0 0 ${w} ${h}" aria-hidden="true"><polyline points="${pts}" fill="none" stroke="${cor}" stroke-width="1.7"/></svg>`;
}

function tagEstagio(p){
  return `<span class="tag-estagio" style="color:${p?.hex||CORES.neutro}">${esc(p?.estagio||'Sem leitura')}</span>`;
}
function frasePanorama(p){
  if(!p||!p.n_nucleo) return 'Ainda não há cobertura suficiente para uma leitura agregada.';
  const cobertura=p.atualizados_no_mes<p.n_nucleo
    ? ` Nesta fotografia, ${p.atualizados_no_mes} de ${p.n_nucleo} indicadores já têm competência ${mesPt(p.referencia)}; os demais usam a publicação oficial anterior.`:'';
  if(p.share_pos>=.6) return 'A expansão segue disseminada entre os indicadores centrais.'+cobertura;
  if(p.share_pos>=.4) return 'O conjunto perdeu ritmo, mas ainda não aponta contração disseminada.'+cobertura;
  return 'A atividade mostra fragilidade, com poucos indicadores centrais avançando.'+cobertura;
}
function graficoPanorama(){
  const dados=P.panorama_historico||[], w=720,h=210,pl=34,pr=18,pt=20,pb=35;
  if(!dados.length) return '';
  const x=i=>pl+i*(w-pl-pr)/Math.max(1,dados.length-1), y=v=>pt+(1-(v||0))*(h-pt-pb);
  const pontos=dados.map((d,i)=>`${x(i).toFixed(1)},${y(d.share_pos).toFixed(1)}`).join(' ');
  const grades=[0,.25,.5,.75,1].map(v=>`<g><line x1="${pl}" x2="${w-pr}" y1="${y(v)}" y2="${y(v)}" stroke="${LINHA}" stroke-width="1"/><text x="0" y="${y(v)+4}" fill="${TINTA2}" font-size="10">${Math.round(v*100)}%</text></g>`).join('');
  const area=`${pl},${y(0)} ${pontos} ${w-pr},${y(0)}`;
  const marcas=dados.map((d,i)=>`<g><circle cx="${x(i)}" cy="${y(d.share_pos)}" r="${d.referencia===referenciaSelecionada?7:4}" fill="${d.hex}" stroke="${PAPEL}" stroke-width="2"/><title>${mesPt(d.referencia,true)} · ${Math.round((d.share_pos||0)*100)}% positivos</title></g>`).join('');
  return `<svg class="historico-svg" viewBox="0 0 ${w} ${h}" role="img" aria-label="Evolução da difusão positiva nos últimos doze meses">${grades}<polygon points="${area}" fill="${CORES.positivo}" opacity=".08"/><polyline points="${pontos}" fill="none" stroke="${TINTA}" stroke-width="2.2"/>${marcas}</svg>`;
}
function seletorMeses(){
  return `<div class="seletor-meses">${P.panorama_historico.map(d=>`<button class="mes-botao ${d.referencia===referenciaSelecionada?'ativo':''}" onclick="selecionarMes('${d.referencia}')">${mesPt(d.referencia).split(' ')[0]}</button>`).join('')}</div>`;
}
function comparativos(){
  const dados=P.panorama_historico, atual=dados.findIndex(d=>d.referencia===referenciaSelecionada);
  const cortes=[{n:0,t:'Retrato selecionado'},{n:3,t:'Três meses antes'},{n:6,t:'Seis meses antes'}];
  return `<div class="comparativos">${cortes.map(c=>{
    const p=dados[Math.max(0,atual-c.n)]||dados[0];
    return `<div class="comparativo"><div class="tempo">${c.t} · ${mesPt(p.referencia)}</div><div class="valor" style="color:${p.hex}">${Math.round((p.share_pos||0)*100)}% positivos</div><div class="detalhe">${p.n_pos} de ${p.n_nucleo} no núcleo · ${esc(p.estagio.toLowerCase())}</div></div>`;
  }).join('')}</div>`;
}
function setorCard(setor,idx){
  const grupo=grupoDe(setor),r=resumoGrupo(grupo),cor=r.share>=.6?CORES.positivo:r.share>=.4?CORES.estavel:CORES.negativo;
  const destaque=grupo.find(i=>i.nucleo)||grupo[0];
  return `<button class="setor-card" style="--cenario:${cor};--cenario-fundo:${cor}12;--cenario-hover:${cor}1d" onclick="nav('s/${setor.slug}')" aria-label="Abrir setor ${esc(setor.nome)}">
    <div class="setor-topo"><span class="setor-num">${String(idx+1).padStart(2,'0')} / SETOR</span><span class="saldo-setor" style="color:${cor}">${r.altas}<small> / ${r.total}</small></span></div>
    <h3>${esc(setor.nome)}</h3><p>${r.altas} em alta, ${r.quedas} em queda na fotografia de ${mesPt(referenciaSelecionada,true).toLowerCase()}.</p>
    <div class="setor-rodape"><span class="tag-estagio" style="color:${cor}">${Math.round(r.share*100)}% positivos</span>${destaque?svgSpark(destaque,cor):''}</div>
  </button>`;
}
function celulaHistorica(ind,ref){
  const h=leituraEm(ind,ref); if(!h) return '<span class="celula-sinal">—</span>';
  const stale=h.referencia!==ref,s=direcao(h),cor=corSinal(s);
  return `<span class="celula-sinal ${stale?'stale':''}" style="background:${cor}18;color:${cor};border-color:${cor}55" title="${mesPt(h.referencia,true)} · tendência ${textoSinal(s)}">${setaSinal(s)}</span>`;
}
function matrizIndicadores(indicadores=P.indicadores){
  const refs=P.panorama_historico.filter(p=>p.referencia<=referenciaSelecionada).slice(-6).map(p=>p.referencia);
  const linhas=indicadores.map(ind=>{
    const h=leituraEm(ind),cor=h?corSinal(direcao(h)):CORES.neutro;
    return `<tr><td><button class="linha-indicador" onclick="nav('i/${ind.chave}')"><strong>${esc(ind.rotulo)}</strong><span>${esc(ind.dimensao)}</span></button></td>
      ${refs.map(r=>`<td>${celulaHistorica(ind,r)}</td>`).join('')}
      <td><span class="valor-tabela" style="color:${cor}">${h?fmtVar(h.var_mm3_3m,ind.unidade):'—'}</span></td>
      <td><span class="competencia">${h?mesPt(h.referencia):'—'}${h&&h.referencia!==referenciaSelecionada?' *':''}</span></td></tr>`;
  }).join('');
  return `<div class="matriz-wrap"><table class="matriz"><thead><tr><th>Indicador</th>${refs.map(r=>`<th>${mesPt(r)}</th>`).join('')}<th>Tendência</th><th>Competência</th></tr></thead><tbody>${linhas}</tbody></table></div>
    <p style="font-size:10px;color:${TINTA2};margin-top:9px">* A competência é anterior ao mês da coluna; a última leitura oficial foi mantida até a divulgação seguinte. Histórico recalculado com a série atualmente disponível.</p>`;
}
function telaHome(){
  const p=panoramaEm(), pct=Math.round((p?.share_pos||0)*100);
  return `<section class="hero"><div class="hero-leitura"><div class="secao-kicker">Leitura de ${mesPt(referenciaSelecionada,true)}</div><h1>${esc(p?.estagio||'Panorama em formação')}</h1><p class="hero-texto">${frasePanorama(p)}</p>
    <div class="numero-chave"><strong>${pct}%</strong><span>dos indicadores centrais em trajetória positiva</span></div>${tagEstagio(p)}</div>
    <div class="hero-grafico"><div class="grafico-cab"><div><div class="secao-kicker">Panorama no tempo</div><h2>Doze meses de difusão</h2></div><p>Clique em um mês para reconstruir<br>o retrato daquele período.</p></div>${graficoPanorama()}${seletorMeses()}</div></section>
    ${comparativos()}
    <section class="secao"><div class="secao-cab"><div><div class="secao-kicker">Mapa da atividade</div><h2>Setores em perspectiva</h2></div><p>O fundo suave resume o cenário de cada grupo; números e séries preservam a leitura detalhada.</p></div><div class="grade-setores">${SETORES.map(setorCard).join('')}</div></section>
    <section class="secao"><div class="secao-cab"><div><div class="secao-kicker">Série histórica</div><h2>Como os indicadores mudaram</h2></div><p>Setas sólidas usam a competência do próprio mês. Setas esmaecidas carregam a última divulgação disponível.</p></div>${matrizIndicadores()}</section>`;
}
function faixaHistorico(ind){
  return `<div class="faixa-historico">${(ind.historico||[]).filter(h=>h.referencia<=referenciaSelecionada).slice(-10).map(h=>`<span class="ponto-mes" style="background:${corSinal(direcao(h))}" data-mes="${mesPt(h.referencia)}" title="${mesPt(h.referencia,true)} · tendência ${textoSinal(direcao(h))}"></span>`).join('')}</div>`;
}
function voltarInicio(){
  return `<button class="voltar-inicio" onclick="nav('home')" aria-label="Voltar ao panorama inicial"><span class="seta-voltar" aria-hidden="true">←</span><span>Voltar ao panorama</span></button>`;
}
function telaSetor(slug){
  const setor=setorPorSlug(slug)||SETORES[0],grupo=grupoDe(setor),r=resumoGrupo(grupo);
  const cor=r.share>=.6?CORES.positivo:r.share>=.4?CORES.estavel:CORES.negativo;
  const refs=P.panorama_historico.filter(p=>p.referencia<=referenciaSelecionada).slice(-8).map(p=>p.referencia);
  return `<div class="breadcrumb">${voltarInicio()}<span>/</span><span>${esc(setor.nome)}</span></div>
    <header class="pagina-cab"><div><div class="secao-kicker">Setor · retrato de ${mesPt(referenciaSelecionada,true)}</div><h1>${esc(setor.nome)}</h1><p>${r.altas} indicadores avançam, ${r.quedas} recuam e ${r.total-r.altas-r.quedas} permanecem estáveis. Selecione outra competência para comparar a composição do setor.</p></div>
    <div class="pagina-resumo"><strong style="color:${cor}">${r.altas} / ${r.total}</strong><span class="competencia">indicadores em alta</span></div></header>
    <div class="competencias">${refs.map(ref=>`<button class="competencia-link ${ref===referenciaSelecionada?'ativo':''}" onclick="selecionarMes('${ref}')">${mesPt(ref)}</button>`).join('')}</div>
    <div class="grade-indicadores">${grupo.map(ind=>{
      const h=leituraEm(ind),s=h?direcao(h):0,corInd=h?corSinal(s):CORES.neutro;
      return `<button class="indicador-card" onclick="nav('i/${ind.chave}/${setor.slug}')"><div class="indicador-meta"><span>${esc(ind.freq==='Q'?'Trimestral':'Mensal')}</span><span style="color:${corInd}">${h?setaSinal(s)+' '+textoSinal(s):'sem leitura'}</span></div>
        <h3>${esc(ind.rotulo)}</h3><div class="indicador-valor" style="color:${corInd}">${h?fmtVar(h.var_mm3_3m,ind.unidade):'—'}</div>
        <div class="indicador-meta"><span>Tendência de 3 períodos</span><span>competência ${h?mesPt(h.referencia):'—'}${h&&h.referencia!==referenciaSelecionada?' · última disponível':''}</span></div>${faixaHistorico(ind)}</button>`;
    }).join('')}</div>
    <section class="secao"><div class="secao-cab"><div><div class="secao-kicker">Comparação</div><h2>Trajetória dos indicadores</h2></div><p>O painel abaixo mostra a direção mensal e explicita quando a fonte ainda não publicou uma nova competência.</p></div>${matrizIndicadores(grupo)}</section>`;
}
function metrica(rotulo,valor,descricao,cor=TINTA){ return `<div class="metrica"><div class="rotulo">${esc(rotulo)}</div><div class="valor" style="color:${cor}">${esc(valor)}</div><p>${esc(descricao)}</p></div>`; }
function plotSerie(id,ind,h,ultimos=60){
  const s=serieAte(ind),datas=s.datas.slice(-ultimos),vals=s.valores.slice(-ultimos),mm3=s.mm3.slice(-ultimos),cor=h?corSinal(direcao(h)):CORES.neutro;
  Plotly.newPlot(id,[{x:datas,y:vals,mode:'lines',name:'Série oficial',line:{color:cor,width:2.3}},{x:datas,y:mm3,mode:'lines',name:'Média móvel 3 períodos',line:{color:TINTA,width:1.4,dash:'dot'}}],{
    height:ultimos>20?390:260,margin:{l:48,r:20,t:24,b:38},paper_bgcolor:CARTAO,plot_bgcolor:CARTAO,font:{family:FONTE,color:TINTA2,size:11},
    legend:{orientation:'h',y:1.09,x:0},xaxis:{gridcolor:'#e5e0d5'},yaxis:{gridcolor:'#e5e0d5'},hovermode:'x unified'
  },{displayModeBar:false,responsive:true});
}
function telaDetalhe(chave,slug){
  const ind=P.indicadores.find(i=>i.chave===chave)||P.indicadores[0];
  const setor=setorPorSlug(slug)||SETORES.find(s=>s.dims.includes(ind.dimensao))||SETORES[0];
  const h=leituraEm(ind),s=h?direcao(h):0,cor=h?corSinal(s):CORES.neutro,txt=TEXTOS[ind.chave]||{};
  return `<div class="breadcrumb">${voltarInicio()}<span>/</span><button onclick="nav('s/${setor.slug}')">${esc(setor.nome)}</button><span>/</span><span>${esc(ind.rotulo)}</span></div>
    <header class="detalhe-topo"><div><div class="secao-kicker">${h?setaSinal(s)+' '+textoSinal(s):'Sem leitura'} · competência ${h?mesPt(h.referencia,true):'—'}</div><h1>${esc(ind.rotulo)}</h1><p>Leitura baseada na última publicação oficial disponível. O histórico abaixo permite separar o movimento recente da tendência de três períodos.</p></div>
    <div class="detalhe-fonte"><strong>Fonte</strong><br>${esc(ind.fonte_desc)}<br><br><strong>Origem desta coleta</strong><br>${esc(ind.origem_dado)} · ${esc(ind.coleta_status)}</div></header>
    <div class="metricas">${metrica('Variação no período',h?fmtVar(h.var_mensal,ind.unidade):'—','Mudança contra a competência anterior.',TINTA)}
      ${metrica('Média móvel de 3 períodos',h?fmtNum(h.mm3,1):'—','Nível suavizado para reduzir oscilações pontuais.',TINTA)}
      ${metrica('Tendência contra 3 anteriores',h?fmtVar(h.var_mm3_3m,ind.unidade):'—','Métrica usada para classificar a direção do indicador.',cor)}</div>
    <div class="graficos"><div class="grafico-painel"><div class="grafico-titulo">Série histórica</div><div id="grafico-serie"></div></div><div class="grafico-painel"><div class="grafico-titulo">Últimas 12 leituras</div><div id="grafico-recente"></div></div></div>
    <div class="fichas"><article class="ficha"><div class="secao-kicker">Definição</div><h3>O que é?</h3><p>${esc(txt.o_que||'—')}</p></article>
      <article class="ficha"><div class="secao-kicker">Relevância</div><h3>Por que importa?</h3><p>${esc(txt.por_que||'—')}</p></article>
      <article class="ficha"><div class="secao-kicker">Leitura</div><h3>Como interpretar?</h3><p>${esc(txt.como||'—')}</p></article></div>`;
}
function render(moverFoco=false){
  const rota=(location.hash||'#home').slice(1),partes=rota.split('/'),conteudo=document.getElementById('conteudo');
  conteudo.classList.remove('revelar'); void conteudo.offsetWidth; conteudo.classList.add('revelar');
  if(partes[0]==='s'&&partes[1]) conteudo.innerHTML=telaSetor(partes[1]);
  else if(partes[0]==='i'&&partes[1]){
    conteudo.innerHTML=telaDetalhe(partes[1],partes[2]);
    const ind=P.indicadores.find(i=>i.chave===partes[1])||P.indicadores[0],h=leituraEm(ind);
    plotSerie(document.getElementById('grafico-serie'),ind,h,60);plotSerie(document.getElementById('grafico-recente'),ind,h,12);
  } else conteudo.innerHTML=telaHome();
  window.scrollTo(0,0);
  if(moverFoco) setTimeout(()=>conteudo.focus({preventScroll:true}),0);
}
window.addEventListener('hashchange',()=>render(true));

const cache=P.fontes_cache||[];
const ultimoPanorama=P.panorama_historico.at(-1);
const notaCobertura=ultimoPanorama
  ? ` O corte do panorama é ${mesPt(ultimoPanorama.referencia,true).toLowerCase()}: ${ultimoPanorama.atualizados_no_mes} de ${ultimoPanorama.n_nucleo} séries centrais já têm essa competência${ultimoPanorama.atualizados_no_mes<ultimoPanorama.n_nucleo?'; as demais mantêm a última divulgação oficial disponível.':'; todas as séries centrais estão nessa competência.'}`
  : '';
document.getElementById('mes-corrente').textContent=mesPt(P.mes_corrente||P.referencia_alvo,true);
document.getElementById('competencia-recente').textContent=mesPt(P.competencia_mais_recente,true).toLowerCase();
document.getElementById('aviso-frescor').innerHTML=`<span class="sinal-frescor ${cache.length?'cache':''}"></span><div><strong>Site atualizado em ${esc(P.gerado_em)}.</strong> Mês corrente e competência estatística não são a mesma coisa: BCB e IBGE divulgam cada série em calendários próprios.${notaCobertura} ${cache.length?`Nesta execução, ${cache.length} série(s) usaram o último cache válido: ${cache.map(esc).join(', ')}.`:'Todas as séries desta execução vieram das fontes oficiais.'}</div>`;
document.getElementById('rodape').innerHTML=`<span><strong>Metodologia:</strong> variação no período, média móvel de três períodos e comparação contra os três períodos anteriores.</span><span>Leitura analítica; não constitui datação oficial do ciclo.</span>`;
render();
</script>
</body>
</html>
