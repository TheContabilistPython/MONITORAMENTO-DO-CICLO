name: Publica painel no GitHub Pages

on:
  # republica todo dia às 09:00 de Brasília (12:00 UTC);
  # os dados mudam no máximo uma vez por mês, mas o custo é zero
  schedule:
    - cron: "0 12 * * *"
  # republica a cada push na branch principal
  push:
    branches: [main]
  # permite rodar manualmente pela aba Actions
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 40
    steps:
      - uses: actions/checkout@v4

      - name: Recupera o último cache válido das séries
        uses: actions/cache@v4
        with:
          path: painel_ciclo/dados
          key: painel-dados-${{ github.run_id }}
          restore-keys: |
            painel-dados-

      # A origem precisa ser selecionada uma vez em
      # Settings > Pages > Source: GitHub Actions. O GITHUB_TOKEN do workflow
      # não tem permissão administrativa para habilitar o Pages sozinho.
      - name: Configura o GitHub Pages
        uses: actions/configure-pages@v5

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Instala dependências
        run: pip install -r painel_ciclo/requirements.txt

      - name: Coleta dados e gera o site estático
        env:
          PYTHONIOENCODING: utf-8
          # Tenta novamente antes de recorrer ao último cache válido. Isso
          # evita congelar uma competência por uma falha transitória da API.
          PAINEL_HTTP_TIMEOUT: "30"
          PAINEL_HTTP_TENTATIVAS: "3"
        run: python -m painel_ciclo.exporta_site

      - uses: actions/upload-pages-artifact@v3
        with:
          path: painel_ciclo/site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
